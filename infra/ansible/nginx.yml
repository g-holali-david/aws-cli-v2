---
- name: Install of Nginx
  hosts: web_servers
  become: true
  gather_facts: false
  pre_tasks:
    - name: Wait for SSH to be reachable
      ansible.builtin.wait_for_connection:
        delay: 5
        timeout: 180
  tasks:
    - name: Install Nginx
      ansible.builtin.apt:
        name: nginx
        state: present
        update_cache: true

    - name: Start and enable Nginx service
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: true

    - name: Deploy Tooplate template
      ansible.builtin.copy:
        src: site/
        dest: /var/www/html/
        mode: '0644'
